kind = "web"
previewPath = "/"
title = "AI 3D Music Galaxy"
version = "1.0.0"
id = "artifacts/music-galaxy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23796

[services.development]
run = "pnpm --filter @workspace/music-galaxy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/music-galaxy", "run", "build" ]
publicDir = "artifacts/music-galaxy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23796"
BASE_PATH = "/"
